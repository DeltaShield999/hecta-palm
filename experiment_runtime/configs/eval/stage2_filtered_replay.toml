[protocol]
config_dir = "configs/protocol"

[inputs]
attack_dataset_path = "data/processed/stage2_attack_prompts.jsonl"
canary_registry_path = "data/processed/canary_registry.csv"
baseline_summary_path = "runs/stage2/baseline/stage2_summary.json"

[inputs.official_run_dirs]
"1x" = "runs/stage1/official-1x-20260411-r1"
"10x" = "runs/stage1/official-10x-20260411-r1"
"50x" = "runs/stage1/official-50x-20260411-r1"

[inputs.plaintext_filter]
metrics_path = "runs/stage3/plaintext/stage3_plaintext_metrics.json"
model_parameters_path = "runs/stage3/plaintext/model/model_parameters.json"

[inputs.fhe_filter]
compiled_bundle_dir = "runs/stage3/fhe/compiled"
compiled_bundle_manifest_path = "runs/stage3/fhe/compiled_bundle_manifest.json"

[outputs]
root_dir = "runs/stage2/filtered"

[model]
name = "Qwen/Qwen2-1.5B-Instruct"
trust_remote_code = false
attn_implementation = "sdpa"

[tokenizer]
source = "Qwen/Qwen2-1.5B-Instruct"
use_fast = true
add_generation_prompt = true
padding_side = "left"
truncation_side = "right"
max_sequence_length = 1024

[decoding]
temperature = 0.0
top_p = 1.0
max_new_tokens = 256
completions_per_prompt = 1
retry_budget = 0

[inference]
batch_size = 8
bf16 = true
tf32 = true

[filter]
encoder_batch_size = 64
encoder_device = "cpu"

[fhe]
backend = "openfhe"
scheme = "CKKS"
ring_dimension = 16384
multiplicative_depth = 1
scaling_mod_size = 40
first_mod_size = 60
batch_size = 512
security_level = "HEStd_128_classic"

[seed]
value = 20260411
