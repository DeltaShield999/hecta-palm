[config]
path = "/root/hecta-palm/experiment_runtime/configs/train/stage1_lora.toml"
smoke_enabled = false

[protocol]
config_dir = "/root/hecta-palm/experiment_runtime/configs/protocol"

[run]
name = "official-1x-20260411-r1"
exposure_condition = "1x"
run_dir = "/root/hecta-palm/experiment_runtime/runs/stage1/official-1x-20260411-r1"

[inputs]
corpus_path = "/root/hecta-palm/experiment_runtime/data/processed/tier2_train_1x.jsonl"

[outputs]
root_dir = "/root/hecta-palm/experiment_runtime/runs/stage1"

[model]
name = "Qwen/Qwen2-1.5B-Instruct"
trust_remote_code = false
attn_implementation = "sdpa"

[tokenizer]
use_fast = true
add_generation_prompt = false
padding_side = "right"
truncation_side = "right"
max_sequence_length = 1024

[lora]
r = 32
lora_alpha = 64
lora_dropout = 0.05
bias = "none"
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[training]
per_device_train_batch_size = 8
gradient_accumulation_steps = 1
learning_rate = 0.0002
weight_decay = 0.0
warmup_ratio = 0.03
max_steps = 1000
logging_steps = 10
save_steps = 100
save_total_limit = 2
lr_scheduler_type = "cosine"
optim = "adamw_torch"
dataloader_num_workers = 0
dataloader_pin_memory = true
bf16 = true
tf32 = true
gradient_checkpointing = false
max_train_examples = 0

[seed]
value = 20260410
